name: Patch apply check - production

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  apply:
    name: Apply production patch series
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Check production patches apply cleanly
        run: ./apply.sh -c -m tags.txt -e production
